<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picasso AI Insight Hub</title>
    <style>
        :root {
            --bg-body: #F9FAFB; --bg-card: #FFFFFF; --border-light: #E5E7EB;
            --primary: #4F46E5; --primary-hover: #4338CA; --primary-light: #EEF2FF;
            --text-main: #111827; --text-sub: #4B5563; --text-meta: #9CA3AF;
            --text-white: #FFFFFF; --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            --radius-lg: 16px; --radius-md: 8px; --radius-full: 9999px;
            --container-width: 1100px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background-color: var(--bg-body); color: var(--text-main); line-height: 1.6; -webkit-font-smoothing: antialiased; font-size: 15px; }
        .container { max-width: var(--container-width); margin: 0 auto; padding: 0 24px; width: 100%; }
        .flex { display: flex; } .items-center { align-items: center; } .justify-between { justify-content: space-between; }
        .gap-2 { gap: 8px; } .gap-4 { gap: 16px; } .mb-6 { margin-bottom: 24px; }
        .text-sm { font-size: 14px; } .font-bold { font-weight: 700; } .font-medium { font-weight: 500; }
        .text-gray { color: var(--text-sub); } .text-meta { color: var(--text-meta); } .text-primary { color: var(--primary); } .text-white { color: var(--text-white); }

        /* Header */
        header { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-light); height: 72px; display: flex; align-items: center; }
        .logo-wrapper { display: flex; align-items: center; gap: 8px; margin-right: 24px; cursor: pointer; transition: opacity 0.2s; }
        .logo-wrapper:hover { opacity: 0.8; }
        .logo-text { font-size: 20px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .logo-text span { color: var(--primary); }
        .search-box { flex: 1; max-width: 400px; position: relative; }
        .search-box input { width: 100%; padding: 10px 20px; border-radius: var(--radius-full); border: 1px solid var(--border-light); background: #fff; font-size: 14px; transition: all 0.2s; }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .fav-entry { margin-left: auto; cursor: pointer; color: var(--text-sub); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: var(--radius-md); transition: all 0.2s; }
        .fav-entry:hover { background: var(--bg-body); color: var(--primary); }

        /* Dashboard */
        .dashboard { padding: 32px 0 24px; display: flex; flex-direction: column; gap: 24px; }
        .dash-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-lg); box-shadow: var(--shadow-soft); overflow: hidden; }
        .trend-section { display: grid; grid-template-columns: 1.2fr 1fr; min-height: 450px; }
        .chart-container { padding: 24px; border-right: 1px solid var(--border-light); display: flex; flex-direction: column; }
        .section-title { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; display: block; width: 4px; height: 18px; background: var(--primary); border-radius: 2px; }
        .bar-chart { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding-right: 10px; }
        .bar-row { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 8px 0; transition: all 0.2s; border-radius: var(--radius-md); }
        .bar-row:hover { background: var(--bg-body); }
        .bar-row.active .bar-label { color: var(--primary); font-weight: 700; }
        .bar-row.active .bar-fill { background: var(--primary); }
        .bar-label { width: 140px; font-size: 14px; color: var(--text-sub); text-align: right; flex-shrink: 0; }
        .bar-wrapper { flex: 1; background: #F3F4F6; border-radius: var(--radius-full); height: 12px; overflow: hidden; }
        .bar-fill { height: 100%; background: #C7D2FE; border-radius: var(--radius-full); width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .bar-count { width: 40px; font-size: 12px; color: var(--text-meta); text-align: left; flex-shrink: 0; }

        .detail-panel { padding: 24px; background: #fff; display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .topic-title { font-size: 20px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; }
        .topic-summary { font-size: 15px; color: var(--text-sub); margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border-light); line-height: 1.7; }

        /* 驱动因素卡片 (无背景色版) */
        .drivers-title { font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
        .driver-list { list-style: none; display: flex; flex-direction: column; gap: 16px; }
        .driver-item { 
            padding: 12px 0; 
            border-bottom: 1px solid #F3F4F6; 
        }
        .driver-item:last-child { border-bottom: none; }
        .driver-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .driver-tag { 
            font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 4px; 
            background: var(--primary-light); color: var(--primary); text-transform: uppercase; 
        }
        .driver-title { font-size: 15px; font-weight: 600; color: var(--text-main); }
        .driver-desc { font-size: 14px; color: var(--text-sub); line-height: 1.6; }
        .driver-evidence { font-size: 13px; color: var(--text-meta); margin-top: 4px; font-style: italic; }
        .driver-evidence strong { color: var(--text-sub); font-style: normal; }

        .brief-section { padding: 24px; background: linear-gradient(135deg, #FFFFFF 0%, #F9FAFB 100%); }
        .brief-content { font-size: 15px; color: var(--text-sub); line-height: 1.8; max-width: 900px; }
        .brief-content strong { color: var(--text-main); font-weight: 700; }

        /* Feed Controls */
        .feed-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; }
        .feed-title { font-size: 18px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .feed-title::before { content: ''; display: block; width: 4px; height: 20px; background: var(--primary); border-radius: 2px; }
        .time-filter { display: flex; align-items: center; gap: 8px; background: #fff; padding: 4px; border-radius: var(--radius-full); border: 1px solid var(--border-light); }
        .filter-btn { padding: 6px 12px; border: none; background: transparent; border-radius: var(--radius-full); font-size: 13px; font-weight: 500; color: var(--text-sub); cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background: var(--text-main); color: #fff; }
        .filter-btn:hover:not(.active) { background: var(--bg-body); }
        .date-picker-wrapper { position: relative; }
        .date-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--border-light); background: #fff; border-radius: var(--radius-full); font-size: 13px; color: var(--text-sub); cursor: pointer; transition: all 0.2s; }
        .date-btn:hover { border-color: var(--primary); color: var(--primary); }
        #calendar-input { position: absolute; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer; }

        /* News Feed */
        .feed-container { max-width: var(--container-width); margin: 0 auto 60px; padding: 0 24px; }
        .news-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 24px; box-shadow: var(--shadow-soft); transition: all 0.3s; }
        .news-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: #C7D2FE; }
        .card-header { margin-bottom: 20px; }
        .news-title-link { font-size: 19px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; line-height: 1.4; text-decoration: none; display: block; transition: color 0.2s; }
        .news-title-link:hover { color: var(--primary); text-decoration: underline; }
        .meta-row { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--text-meta); }
        .dup-badge { background: #F3F4F6; color: var(--text-sub); padding: 2px 8px; border-radius: var(--radius-full); font-size: 11px; font-weight: 600; border: 1px solid var(--border-light); }

        .quick-scan { background: var(--bg-body); border-left: 4px solid var(--primary); padding: 16px 20px; border-radius: 0 var(--radius-md) var(--radius-md) 0; margin-bottom: 24px; }
        .quick-scan-label { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        .quick-scan-text { font-size: 15px; color: var(--text-main); line-height: 1.6; font-weight: 500; }

        .core-info { margin-bottom: 24px; }
        .info-label { font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .summary-text { font-size: 14px; color: var(--text-sub); margin-bottom: 12px; line-height: 1.7; }
        .tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { background: #fff; border: 1px solid var(--border-light); color: var(--text-sub); padding: 4px 10px; border-radius: var(--radius-full); font-size: 12px; font-family: monospace; cursor: pointer; transition: all 0.2s; }
        .tag:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

        .pm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .pm-block { padding: 20px; border-radius: var(--radius-md); font-size: 14px; line-height: 1.7; border: 1px solid transparent; }
        .pm-block h4 { font-size: 15px; margin-bottom: 10px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .block-user { background: #F5F3FF; color: #4C1D95; border-color: #EDE9FE; }
        .block-biz { background: #FFF7ED; color: #9A3412; border-color: #FFEDD5; }
        .block-risk { background: #FEF2F2; color: #991B1B; border-color: #FEE2E2; grid-column: 1 / -1; }

        .insight-block { background: #4f46e5; color: #ffffff; border: 1px solid #4338ca; border-left: 4px solid #ffffff; padding: 20px; border-radius: var(--radius-md); }
        .insight-block h4 { font-size: 15px; margin-bottom: 12px; font-weight: 700; color: #ffffff; }
        .insight-list { list-style: none; }
        .insight-list li { margin-bottom: 8px; position: relative; padding-left: 20px; font-size: 14px; line-height: 1.6; }
        .insight-list li::before { content: "✓"; position: absolute; left: 0; color: #A5B4FC; font-weight: bold; }

        .card-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-light); display: flex; gap: 20px; }
        .action-btn { background: none; border: none; cursor: pointer; color: var(--text-meta); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s; padding: 6px 12px; border-radius: var(--radius-md); }
        .action-btn:hover { background: var(--bg-body); color: var(--primary); }
        .action-btn.favorite.active { color: #F59E0B; background: #FFFBEB; }

        /* Favorites */
        #favorites-view { display: none; padding: 32px 24px; max-width: var(--container-width); margin: 0 auto; }
        .fav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .back-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: #fff; border: 1px solid var(--border-light); border-radius: var(--radius-full); font-size: 13px; font-weight: 600; color: var(--text-sub); cursor: pointer; transition: all 0.2s; }
        .back-btn:hover { background: var(--bg-body); color: var(--primary); border-color: var(--primary); }
        .fav-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-soft); border: 1px solid var(--border-light); }
        .fav-table th { text-align: left; padding: 16px 24px; background: #F9FAFB; font-size: 12px; font-weight: 700; color: var(--text-sub); border-bottom: 1px solid var(--border-light); }
        .fav-table td { padding: 20px 24px; border-bottom: 1px solid var(--border-light); font-size: 14px; vertical-align: middle; }
        .fav-table tr:last-child td { border-bottom: none; }
        .fav-table tr:hover { background: #F9FAFB; }
        .fav-title { font-weight: 600; color: var(--text-main); display: block; margin-bottom: 6px; text-decoration: none; }
        .fav-title:hover { color: var(--primary); text-decoration: underline; }
        .fav-scan { font-size: 13px; color: var(--text-sub); display: block; margin-bottom: 6px; line-height: 1.5; background: #F9FAFB; padding: 8px; border-radius: 6px; border-left: 3px solid var(--primary); }
        .fav-tags { font-size: 12px; color: var(--text-meta); }
        .time-col { text-align: right; color: var(--text-meta); font-size: 13px; font-family: monospace; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-meta); background: #fff; border-radius: var(--radius-lg); border: 1px dashed var(--border-light); }

        @media (max-width: 900px) { .trend-section { grid-template-columns: 1fr; } .chart-container { border-right: none; border-bottom: 1px solid var(--border-light); } .pm-grid { grid-template-columns: 1fr; } .feed-controls { flex-direction: column; align-items: flex-start; } .time-filter { width: 100%; justify-content: space-between; } }
    </style>
</head>
<body>

            <div id="empty-fav" class="empty-state"><p>暂无收藏内容</p></div>
        </section>
    </div>
    <script>
        const CACHE_KEY = 'picasso_news_v5_final';
        const FAV_KEY = 'picasso_favorites';
        const DAYS = 7;
        const MIN_PER_DAY = 5;

        function initData() {
            try {
                let cached = localStorage.getItem(CACHE_KEY);
                if (!cached) {
                    console.log("Generating fresh data...");
                    cached = generateData();
                    localStorage.setItem(CACHE_KEY, JSON.stringify(cached));
                } else {
                    // 简单的版本检查，如果数据结构不对则重新生成
                    const parsed = JSON.parse(cached);
                    if (!parsed || !Array.isArray(parsed) || parsed.length === 0) {
                        console.log("Cache invalid, regenerating...");
                        cached = generateData();
                        localStorage.setItem(CACHE_KEY, JSON.stringify(cached));
                    }
                }
                return JSON.parse(cached);
            } catch (e) {
                console.error("Data init error:", e);
                return generateData();
            }
        }

                    insight: ["探索本地优先架构", "启动端侧适配", "关注中间件合作"],

        const allNews = initData();
        let favorites = JSON.parse(localStorage.getItem(FAV_KEY)) || [];

        function initDashboard() {

                const widthPercent = (topic.count / maxCount) * 100;
                const row = document.createElement('div');
                row.className = `bar-row ${index === 0 ? 'active' : ''}`;
                row.onclick = () => selectTopic(index, topicData);
                row.innerHTML = `<div class="bar-label">${topic.tag}</div><div class="bar-wrapper"><div class="bar-fill" style="width: ${widthPercent}%"></div></div><div class="bar-count">${topic.count}</div>`;
                chartContainer.appendChild(row);
            });
            selectTopic(0, topicData);
        }

        function selectTopic(index, data) {
            document.querySelectorAll('.bar-row').forEach((r, i) => r.classList.toggle('active', i === index));
            const topic = data[index];
            const panel = document.getElementById('topic-detail');
            panel.style.animation = 'none'; panel.offsetHeight; panel.style.animation = 'fadeIn 0.4s ease';

            // 生成驱动因素卡片 HTML
            const driversHtml = topic.drivers.map(d => `
                <li class="driver-item">
                    <div class="driver-header">
                        <span class="driver-tag">${d.tag}</span>
                        <span class="driver-title">${d.title}</span>
                    </div>
                    <div class="driver-desc">${d.desc}</div>
                    <div class="driver-evidence">佐证：<strong>${d.evidence}</strong></div>
                </li>
            `).join('');

            panel.innerHTML = `
                <div class="topic-title">${topic.tag}</div>
                <div class="topic-summary">${topic.summary}</div>
                <div class="drivers-title">🔍 核心驱动因素 (Why Now?)</div>
                <ul class="driver-list">
                    ${driversHtml}
                </ul>
            `;
        }

        function filterDate(type, btn, event) {
            if (type !== 'custom') {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const today = new Date();
            let filtered = [];
            if (type === 'today') {
                const todayStr = today.toISOString().split('T')[0];
                filtered = allNews.filter(n => n.date === todayStr);
            } else if (type === 'custom') {
                const val = event.target.value;
                if (!val) return;
                filtered = allNews.filter(n => n.date === val);
                btn.parentElement.querySelector('.date-btn').innerHTML = `📅 ${val}`;
            } else if (type === '7days') {
                const past = new Date(today); past.setDate(past.getDate() - 7);
                filtered = allNews.filter(n => new Date(n.date) >= past);
            }
            renderNewsList(filtered);
        }

        function renderNewsList(data) {
            const container = document.getElementById('news-list');
            container.innerHTML = '';
            if (data.length === 0) { container.innerHTML = '<div class="empty-state">该日期暂无资讯</div>'; return; }
            data.forEach(news => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="card-header">
                        <a href="${news.link}" target="_blank" class="news-title-link">${news.title}</a>
                        <div class="meta-row"><span>🏢 ${news.source}</span><span>🕒 ${news.time}</span>${news.dupCount > 0 ? `<span class="dup-badge">+${news.dupCount} sources</span>` : ''}</div>
                    </div>
                    <div class="quick-scan"><span class="quick-scan-label">📰 一句话速览</span><div class="quick-scan-text">${news.quickScan}</div></div>
                    <div class="core-info"><div class="info-label">🔑 核心信息</div><div class="summary-text">${news.summary}</div><div class="tags">${news.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div></div>
                    <div class="pm-grid">
                        <div class="pm-block block-user"><h4>💡 用户价值</h4><p>${news.userValue}</p></div>
                        <div class="pm-block block-biz"><h4>📈 商业影响</h4><p>${news.bizValue}</p></div>
                        <div class="pm-block block-risk"><h4>🚧 落地挑战</h4><p>${news.riskChallenge}</p></div>
                    </div>
                    <div class="insight-block"><h4>💡 给我的启示</h4><ul class="insight-list">${news.insight.map(p => `<li>${p}</li>`).join('')}</ul></div>
                    <div class="card-footer">
                        <button class="action-btn favorite ${favorites.some(f => f.id === news.id) ? 'active' : ''}" onclick="toggleFavorite('${news.id}', this)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="${favorites.some(f => f.id === news.id) ? '#F59E0B' : 'none'}" stroke="${favorites.some(f => f.id === news.id) ? '#F59E0B' : 'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>收藏
                        </button>
                        <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>分享</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleFavorite(id, btn) {
            const news = allNews.find(n => n.id === id);
            const idx = favorites.findIndex(f => f.id === id);
            if (idx === -1) {
                favorites.unshift({ ...news, favTime: new Date().toLocaleString('zh-CN', { hour12: false, month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' }) });
                if(btn) { btn.classList.add('active'); btn.querySelector('svg').setAttribute('fill', '#F59E0B'); btn.querySelector('svg').setAttribute('stroke', '#F59E0B'); }
            } else {
                favorites.splice(idx, 1);
                if(btn) { btn.classList.remove('active'); btn.querySelector('svg').setAttribute('fill', 'none'); btn.querySelector('svg').setAttribute('stroke', 'currentColor'); }
            }
            localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
            if(document.getElementById('favorites-view').style.display === 'block') renderFavorites();
        }

        function switchView(view) {
            const home = document.getElementById('home-view');
            const fav = document.getElementById('favorites-view');
            if (view === 'home') { home.style.display = 'block'; fav.style.display = 'none'; window.scrollTo({ top: 0, behavior: 'smooth' }); }
            else { home.style.display = 'none'; fav.style.display = 'block'; renderFavorites(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        }

        function renderFavorites() {
            const tbody = document.getElementById('fav-list-body');
            const emptyMsg = document.getElementById('empty-fav');
            const term = document.getElementById('fav-search').value.toLowerCase();
            tbody.innerHTML = '';
            const filtered = favorites.filter(item => item.title.toLowerCase().includes(term) || item.quickScan.toLowerCase().includes(term));
            if (filtered.length === 0) { emptyMsg.style.display = 'block'; return; }
            emptyMsg.style.display = 'none';
            filtered.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><a href="${item.link}" target="_blank" class="fav-title">${item.title}</a><span class="fav-scan">📰 ${item.quickScan}</span><span class="fav-tags">${item.tags.map(t => `#${t}`).join(' ')}</span></td>
                    <td class="time-col">${item.favTime}</td>
                    <td class="time-col">${item.date}</td>
                    <td style="text-align: center;"><button class="action-btn" onclick="toggleFavorite('${item.id}', null)" style="color: #EF4444; background: #FEF2F2;">移除</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 初始化
        try {
            initDashboard();
            filterDate('today', document.querySelector('.filter-btn'), null);
        } catch (e) {
            console.error("Init error:", e);
            alert("初始化出错，请刷新页面或清除缓存重试。");
        }
